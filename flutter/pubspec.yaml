name: ktv_app
description: Ứng dụng KTV Điện Phát - Quản lý phiếu sửa chữa
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.3

  # Firebase (disabled for UI testing - enable after adding google-services.json)
  # firebase_core: ^3.3.0
  # firebase_messaging: ^15.1.0
  # flutter_local_notifications: ^17.2.1

  # State management
  provider: ^6.1.2

  # Local storage (JWT token)
  shared_preferences: ^2.3.1

  # Navigation
  go_router: ^14.1.4

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
